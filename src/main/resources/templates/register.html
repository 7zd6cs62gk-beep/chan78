<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="page">
    <div class="card">
        <div class="brand">
            <div class="logo">B</div>
            <h1>회원가입</h1>
            <p>새 블로그 계정을 만드세요.</p>
        </div>

        <div class="alert alert-error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

        <form th:action="@{/register}" th:object="${form}" method="post" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label for="username">아이디</label>
            <input type="text" id="username" th:field="*{username}" placeholder="3자 이상">
            <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>

            <label for="email">이메일</label>
            <input type="email" id="email" th:field="*{email}" placeholder="example@email.com">
            <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>

            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}" placeholder="6자 이상">
            <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>

            <label for="passwordConfirm">비밀번호 확인</label>
            <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" placeholder="비밀번호 재입력">
            <span class="field-error" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></span>

            <button type="submit" class="btn-primary">가입하기</button>
        </form>

        <p class="auth-link">
            이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
        </p>
    </div>
</div>
</body>
</html>
