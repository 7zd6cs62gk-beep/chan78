<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 홈</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="page home-page">
    <header class="home-header">
        <div class="brand-inline">
            <div class="logo small">B</div>
            <span>My Blog</span>
        </div>
        <div class="header-actions">
            <span class="welcome" th:text="'안녕하세요, ' + ${username} + '님'"></span>
            <a th:href="@{/posts/new}" class="btn-primary btn-sm">글 작성</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-outline">로그아웃</button>
            </form>
        </div>
    </header>

    <main class="home-main">
        <h2>게시글 목록</h2>

        <div class="post-list" th:if="${!posts.isEmpty()}">
            <article class="post-item" th:each="post : ${posts}">
                <a th:href="@{/posts/{id}(id=${post.id})}" class="post-title" th:text="${post.title}">제목</a>
                <p class="post-meta">
                    <span th:text="${post.author.username}">author</span>
                    ·
                    <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">date</span>
                </p>
                <p class="post-excerpt" th:text="${#strings.abbreviate(post.content, 120)}">excerpt</p>
            </article>
        </div>

        <div class="empty-state" th:if="${posts.isEmpty()}">
            <p>아직 작성된 글이 없습니다.</p>
            <a th:href="@{/posts/new}" class="btn-primary btn-sm">첫 글 작성하기</a>
        </div>
    </main>
</div>
</body>
</html>
